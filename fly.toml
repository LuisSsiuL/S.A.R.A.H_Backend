# fly.toml app configuration file generated for s-a-r-a-h-backend on 2026-03-06T18:27:56+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 's-a-r-a-h-backend'
primary_region = 'sin'

[build]
  builder = 'paketobuildpacks/builder:base'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
